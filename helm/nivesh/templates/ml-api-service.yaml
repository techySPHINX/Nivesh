apiVersion: v1
kind: Service
metadata:
  name: {{ include "nivesh.fullname" . }}-ml-api-svc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nivesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-api
spec:
  type: {{ .Values.mlApi.service.type }}
  selector:
    {{- include "nivesh.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ml-api
  ports:
    - port: {{ .Values.mlApi.service.port }}
      targetPort: {{ .Values.mlApi.service.targetPort }}
      protocol: TCP
      name: http

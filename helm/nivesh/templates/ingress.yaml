{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nivesh.fullname" . }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nivesh.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName | default "nivesh-tls" }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "nivesh.fullname" . }}-backend-svc
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /ml/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "nivesh.fullname" . }}-ml-api-svc
                port:
                  number: {{ .Values.mlApi.service.port }}
{{- end }}

{{- if .Values.autoscaling.backend.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "nivesh.fullname" . }}-backend-hpa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nivesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "nivesh.fullname" . }}-backend
  minReplicas: {{ .Values.autoscaling.backend.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.backend.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.backend.cpuTarget }}
    {{- if .Values.autoscaling.backend.memoryTarget }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.backend.memoryTarget }}
    {{- end }}
{{- end }}

---

{{- if .Values.autoscaling.mlApi.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "nivesh.fullname" . }}-ml-api-hpa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nivesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "nivesh.fullname" . }}-ml-api
  minReplicas: {{ .Values.autoscaling.mlApi.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.mlApi.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.mlApi.cpuTarget }}
{{- end }}

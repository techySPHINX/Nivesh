# Development environment overrides
backend:
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

mlApi:
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

ingress:
  host: dev.nivesh.example.com
  tls:
    enabled: false

autoscaling:
  backend:
    enabled: false
  mlApi:
    enabled: false

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-api
  namespace: nivesh
  labels:
    app: nivesh
    component: ml-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nivesh
      component: ml-api
  template:
    metadata:
      labels:
        app: nivesh
        component: ml-api
    spec:
      containers:
        - name: ml-api
          image: ghcr.io/techysphinx/nivesh-ml-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always

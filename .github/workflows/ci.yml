name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────── Backend ────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm run build

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nivesh_user
          POSTGRES_PASSWORD: nivesh_password
          POSTGRES_DB: nivesh_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nivesh_user"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        env:
          DATABASE_URL: postgresql://nivesh_user:nivesh_password@localhost:5432/nivesh_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info

  # ──────────────── Frontend ────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  # ──────────────── ML Services ────────────────
  ml-lint:
    name: ML Services Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-services/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install ruff pytest
      - run: ruff check .

  ml-test:
    name: ML Services Tests
    runs-on: ubuntu-latest
    needs: ml-lint
    defaults:
      run:
        working-directory: ml-services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-services/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov
      - run: pytest --cov=. --cov-report=xml --cov-report=term -v
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-coverage
          path: ml-services/coverage.xml

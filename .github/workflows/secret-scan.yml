name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets on diff (PR)
        if: github.event_name == 'pull_request'
        run: |
          git diff ${{ github.event.pull_request.base.sha }}...HEAD --diff-filter=ACM --name-only -z \
            | xargs -0 detect-secrets scan --list \
            && echo "✅ No secrets detected" \
            || (echo "❌ Potential secrets found — see output above" && exit 1)

      - name: Run detect-secrets full scan (push)
        if: github.event_name == 'push'
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.lock$' \
            --exclude-files 'pnpm-lock\.yaml$' \
            --exclude-files '\.env\.example$' \
            --exclude-files 'docker-compose\.env\.example$' \
            > .secrets.baseline
          detect-secrets audit --report --json .secrets.baseline \
            && echo "✅ No secrets detected" \
            || (echo "❌ Potential secrets found — review .secrets.baseline" && exit 1)

  trufflehog:
    name: TruffleHog Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          extra_args: --only-verified --results=verified

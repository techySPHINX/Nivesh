name: Deploy

on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging
      url: https://staging.nivesh.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging
        run: |
          helm upgrade --install nivesh ./helm/nivesh \
            --namespace nivesh --create-namespace \
            -f helm/nivesh/values-staging.yaml \
            --set backend.image.tag=${{ github.sha }} \
            --set mlApi.image.tag=${{ github.sha }} \
            --wait --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/nivesh-backend -n nivesh --timeout=300s
          kubectl rollout status deployment/nivesh-ml-api -n nivesh --timeout=300s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://nivesh.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to production
        run: |
          helm upgrade --install nivesh ./helm/nivesh \
            --namespace nivesh --create-namespace \
            -f helm/nivesh/values-prod.yaml \
            --set backend.image.tag=${{ github.sha }} \
            --set mlApi.image.tag=${{ github.sha }} \
            --wait --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/nivesh-backend -n nivesh --timeout=300s
          kubectl rollout status deployment/nivesh-ml-api -n nivesh --timeout=300s

      - name: Run smoke tests
        run: |
          BACKEND_URL=$(kubectl get ingress -n nivesh -o jsonpath='{.items[0].spec.rules[0].host}')
          curl -sf "https://${BACKEND_URL}/health" || exit 1
          echo "✅ Production smoke test passed"

# Alertmanager Configuration for Nivesh
# Routes fired Prometheus alerts to the appropriate channel.
#
# Environment variables (injected at runtime):
#   SLACK_WEBHOOK_URL   — Incoming webhook for #nivesh-alerts
#   PAGERDUTY_KEY       — PagerDuty integration key (critical only)

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/PLACEHOLDER}"

route:
  receiver: slack-default
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts → PagerDuty + Slack
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true          # also send to Slack

    # Warning alerts → Slack only
    - match:
        severity: warning
      receiver: slack-default

receivers:
  - name: slack-default
    slack_configs:
      - channel: '#nivesh-alerts'
        send_resolved: true
        title: '{{ .Status | toUpper }} | {{ .CommonLabels.alertname }}'
        text: >-
          *Alert:* {{ .CommonAnnotations.summary }}
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          {{ if .CommonAnnotations.runbook_url }}*Runbook:* {{ .CommonAnnotations.runbook_url }}{{ end }}

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_KEY:-PLACEHOLDER}"
        severity: critical
        description: '{{ .CommonAnnotations.summary }}'
        details:
          alert: '{{ .CommonLabels.alertname }}'
          service: '{{ .CommonLabels.service }}'

inhibit_rules:
  # If a critical alert fires, suppress the matching warning
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']

# Business-Critical Alert Rules for Nivesh
# These go beyond ML-specific alerts (which live in ml_drift.yml / ml_performance.yml)

groups:
  - name: backend_api
    interval: 1m
    rules:
      # Backend API error rate > 5 % for 5 minutes
      - alert: HighBackendErrorRate
        expr: |
          sum(rate(http_requests_total{job="backend", status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="backend"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend API error rate exceeds 5 %"
          description: "5xx error ratio is {{ $value | humanizePercentage }} over the last 5 min."
          runbook_url: "https://github.com/techySPHINX/Nivesh/blob/main/docs/runbooks/backend-errors.md"

      # Backend P99 latency > 2 s
      - alert: HighBackendLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le))
          > 2.0
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Backend P99 latency exceeds 2 s"
          description: "P99 latency is {{ $value | humanizeDuration }}."

  - name: databases
    interval: 1m
    rules:
      # PostgreSQL connection pool exhaustion
      - alert: PostgresConnectionPoolExhausted
        expr: pg_stat_activity_count >= pg_settings_max_connections * 0.9
        for: 5m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL connections at ≥ 90 % of max"
          description: "Active connections {{ $value }}. Risk of connection refused errors."

      # PostgreSQL is down
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL exporter unreachable"
          description: "Prometheus cannot scrape the postgres exporter."

      # Redis memory > 80 %
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 10m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage above 80 %"
          description: "Redis is using {{ $value | humanizePercentage }} of its max memory."

  - name: kafka
    interval: 1m
    rules:
      # Kafka consumer lag > 1 000 messages
      - alert: KafkaHighConsumerLag
        expr: kafka_consumergroup_lag_sum > 1000
        for: 10m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "Kafka consumer group lag exceeds 1 000"
          description: "Consumer group {{ $labels.consumergroup }} on topic {{ $labels.topic }} has lag {{ $value }}."

      # Kafka broker is down
      - alert: KafkaBrokerDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka broker unreachable"
          description: "Prometheus cannot scrape the Kafka exporter."

  - name: infrastructure
    interval: 1m
    rules:
      # Any service target is down
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          service: "{{ $labels.job }}"
        annotations:
          summary: "{{ $labels.job }} is DOWN"
          description: "Prometheus target {{ $labels.instance }} for job {{ $labels.job }} has been down for > 2 min."
